version: 2

updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    labels:
      - dependencies
    commit-message:
      prefix: chore

  # ── Go modules ────────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    labels:
      - dependencies
    commit-message:
      prefix: chore
    groups:
      controller-runtime:
        patterns:
          - "sigs.k8s.io/controller-runtime"
      kubernetes:
        patterns:
          - "k8s.io/*"

  # ── Docker base images ────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    labels:
      - dependencies
    commit-message:
      prefix: chore
