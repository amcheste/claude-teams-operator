name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Detect changed files (PR only) ────────────────────────────────────────
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      source_changed: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for source file changes
        id: filter
        run: |
          # On non-PR events (push to main/develop, workflow_call) always run.
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # On PRs: output false only if every changed file is under .github/
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
            | grep -qvE '^\.github/' \
            && echo "source=true" >> "$GITHUB_OUTPUT" \
            || echo "source=false" >> "$GITHUB_OUTPUT"

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.source_changed == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      # golangci-lint is temporarily disabled: k8s.io v0.35 expands the
      # transitive module graph beyond what the 16 GiB CI runner can hold
      # during package loading, OOM-killing the process at ~22 min regardless
      # of linter selection or concurrency settings. go vet (above) covers
      # the critical correctness subset. Re-enable once controller-runtime is
      # bumped to a version whose module graph is compatible with k8s.io v0.35.
      # Tracked in: https://github.com/amcheste/claude-teams-operator/issues

      - name: Check manifests are up to date
        run: |
          make manifests generate
          git diff --exit-code || (echo "CRD manifests or generated code is out of date. Run 'make manifests generate' and commit the result." && exit 1)

      - name: Helm lint
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint ./charts/claude-teams-operator

  # ── Unit & Integration Tests ───────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.source_changed == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: make test

      - name: Install setup-envtest
        run: make envtest

      - name: Integration tests
        run: make test-integration

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: cover.out
          retention-days: 7

  # ── Build operator image ───────────────────────────────────────────────────
  build:
    name: Build Operator Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.source_changed == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build operator Docker image
        run: docker build -f docker/Dockerfile.operator -t claude-teams-operator:ci .

  # ── Commit Lint (PRs only) ────────────────────────────────────────────────
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check conventional commit format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          PATTERN='^(feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\([^)]+\))?(!)?: .+'
          FAIL=0

          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            if echo "$msg" | grep -Eq "$PATTERN"; then
              echo "  ✓ $msg"
            else
              echo "  ✗ Non-conventional: $msg"
              FAIL=1
            fi
          done < <(git log --no-merges --format='%s' "${BASE_SHA}..${HEAD_SHA}")

          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "Commit messages must follow: <type>[scope][!]: <description>"
            echo "Types: feat fix docs chore refactor test style perf ci build revert"
            exit 1
          fi
          echo "All commit messages are conventional ✓"

      - name: Suggest semver bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          BUMP="patch"
          BREAKING=""
          FEATURES=""

          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            if echo "$msg" | grep -Eq '^(feat|fix|docs|chore|refactor|test|style|perf|ci|build|revert)(\([^)]+\))?!: '; then
              BREAKING="$BREAKING\n  - $msg"
              BUMP="major"
            elif echo "$msg" | grep -Eq '^feat(\([^)]+\))?: '; then
              FEATURES="$FEATURES\n  - $msg"
              [[ "$BUMP" != "major" ]] && BUMP="minor"
            fi
          done < <(git log --no-merges --format='%s' "${BASE_SHA}..${HEAD_SHA}")

          {
            case $BUMP in
              major)
                echo "## ⚠️ Suggested bump: \`major\`"
                echo ""
                echo "This PR contains **breaking changes** — increment the major version."
                printf "%b\n" "$BREAKING"
                ;;
              minor)
                echo "## ✨ Suggested bump: \`minor\`"
                echo ""
                echo "This PR adds **new functionality** — increment the minor version."
                printf "%b\n" "$FEATURES"
                ;;
              patch)
                echo "## 🔧 Suggested bump: \`patch\`"
                echo ""
                echo "This PR is a **fix or maintenance** change — increment the patch version."
                ;;
            esac
            echo ""
            echo "Tag the next release with: \`./scripts/bump-version.sh $BUMP\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"
