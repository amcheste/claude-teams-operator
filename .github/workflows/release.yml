name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  # ── Gate: full validation before cutting a release ────────────────────────
  validate:
    name: Validate Before Release
    uses: ./.github/workflows/validate.yml

  # ── Gate: Kind-based acceptance tests on the tag commit ───────────────────
  # Exercises the operator's reconcile loop, PVC provisioning, and pod
  # lifecycle on a real cluster. Duplicate of the PR-time run, but on the
  # exact commit being released. Cheap insurance.
  acceptance:
    name: Acceptance Before Release
    uses: ./.github/workflows/acceptance.yml

  # ── Gate: real-API E2E on the tag commit ──────────────────────────────────
  # fail_if_no_key=true promotes "ANTHROPIC_API_KEY not configured" from a
  # silent skip into a hard failure. Without this, a release could publish
  # artifacts that never exercised the real Claude path.
  e2e:
    name: E2E Before Release
    uses: ./.github/workflows/e2e.yml
    with:
      fail_if_no_key: true
    secrets: inherit

  # ── Build and push container images ───────────────────────────────────────
  images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [validate, acceptance, e2e]
    permissions:
      contents: read
      packages: write
      id-token: write  # for Sigstore OIDC keyless signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (operator)
        id: meta-operator
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/amcheste/claude-teams-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push operator image
        id: build-operator
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile.operator
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Extract Docker metadata (runner)
        id: meta-runner
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/amcheste/claude-code-runner
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push runner image
        id: build-runner
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile.claude-code
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          labels: ${{ steps.meta-runner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3

      - name: Sign operator image with Sigstore keyless
        run: |
          cosign sign --yes \
            ghcr.io/amcheste/claude-teams-operator@${{ steps.build-operator.outputs.digest }}

      - name: Sign runner image with Sigstore keyless
        run: |
          cosign sign --yes \
            ghcr.io/amcheste/claude-code-runner@${{ steps.build-runner.outputs.digest }}

  # ── Publish Helm chart to GHCR as OCI ─────────────────────────────────────
  chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [validate, acceptance, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.2

      - name: Pin chart image tags to release version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # values.yaml ships tag: latest for both operator and runner. At
          # release time we pin both to the release tag so `helm install
          # --version=vX.Y.Z` pulls matching images by default.
          sed -i "s|tag: latest|tag: ${TAG}|g" charts/claude-teams-operator/values.yaml

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Helm chart versions must be SemVer without a leading 'v'.
          VERSION_NUM="${TAG#v}"
          helm package charts/claude-teams-operator \
            --version "${VERSION_NUM}" \
            --app-version "${VERSION_NUM}"
          helm push "claude-teams-operator-${VERSION_NUM}.tgz" \
            oci://ghcr.io/amcheste/charts

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, acceptance, e2e, images, chart]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect pre-release and compute chart version
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ v[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z] ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release tag: ${GITHUB_REF_NAME}"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected stable tag: ${GITHUB_REF_NAME}"
          fi
          # Chart versions are SemVer without the leading 'v'. Expose both so
          # the release body can reference the right form for helm install.
          echo "version_num=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate install.yaml
        env:
          TAG: ${{ github.ref_name }}
        run: bash hack/generate-install-yaml.sh > install.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: install.yaml
          body: |
            ## Install

            ```bash
            # Helm (recommended)
            helm install claude-teams-operator oci://ghcr.io/amcheste/charts/claude-teams-operator \
              --version ${{ steps.prerelease.outputs.version_num }}

            # Raw manifests
            kubectl apply -f https://github.com/amcheste/claude-teams-operator/releases/download/${{ github.ref_name }}/install.yaml
            ```

            ## Container Images

            ```
            ghcr.io/amcheste/claude-teams-operator:${{ github.ref_name }}
            ghcr.io/amcheste/claude-code-runner:${{ github.ref_name }}
            ```

            Images are signed with [Sigstore Cosign](https://docs.sigstore.dev/) (keyless). Verify with:
            ```bash
            cosign verify ghcr.io/amcheste/claude-teams-operator:${{ github.ref_name }} \
              --certificate-identity-regexp="https://github.com/amcheste/claude-teams-operator" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"

            cosign verify ghcr.io/amcheste/claude-code-runner:${{ github.ref_name }} \
              --certificate-identity-regexp="https://github.com/amcheste/claude-teams-operator" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            ```

            See [CHANGELOG](https://github.com/amcheste/claude-teams-operator/blob/main/CHANGELOG.md) for full details.
