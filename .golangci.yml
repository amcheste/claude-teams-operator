run:
  timeout: 5m
  tests: true
  # k8s.io v0.35+ requires Go 1.25 in its go.mod, which causes golangci-lint
  # v1.64.x (built with Go 1.24) to refuse to run. Override until a
  # golangci-lint release built with Go 1.25+ ships.
  go: '1.24'

linters:
  # Type-checking linters (errcheck, unused, govet, gosec, noctx, bodyclose,
  # unconvert, unparam) require golangci-lint to load full type info for the
  # entire transitive dependency graph. k8s.io v0.35 makes that graph large
  # enough to OOM-kill the 16 GiB CI runner before analysis completes.
  # go vet (run as a separate step) covers the critical correctness subset.
  # Re-enable type-checking linters once golangci-lint ships with a leaner
  # type-loader or the runner is upgraded.
  enable:
    - ineffassign    # detect ineffectual assignments (AST-only)
    - misspell       # spelling mistakes in comments/strings (AST-only)
    - prealloc       # slice pre-allocation suggestions (AST-only)
    - gofmt          # formatting
    - goimports      # import ordering

linters-settings:
  goimports:
    local-prefixes: github.com/amcheste/claude-teams-operator

issues:
  exclude-rules:
    # Generated deepcopy files
    - path: zz_generated
      linters:
        - all
