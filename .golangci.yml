run:
  timeout: 5m
  tests: true
  # k8s.io v0.35+ requires Go 1.25 in its go.mod, which causes golangci-lint
  # v1.64.x (built with Go 1.24) to refuse to run. Override until a
  # golangci-lint release built with Go 1.25+ ships.
  go: '1.24'
  # Limit parallelism; the k8s.io v0.35 module graph is large.
  concurrency: 2

linters:
  enable:
    - errcheck       # check unchecked errors
    - govet          # correctness checks
    - ineffassign    # detect ineffectual assignments
    - unused         # check for unused code
    - gofmt          # formatting
    - goimports      # import ordering
    - misspell       # spelling mistakes in comments/strings
    - gosec          # security checks
    - noctx          # http requests without context
    - bodyclose      # http response body closure
    - prealloc       # slice pre-allocation suggestions
    - unconvert      # unnecessary type conversions
    - unparam        # unused function parameters

linters-settings:
  gosec:
    excludes:
      - G107  # url provided to HTTP request as taint input (we trust CR content)
  goimports:
    local-prefixes: github.com/amcheste/claude-teams-operator

issues:
  exclude-rules:
    # Test files get more relaxed rules
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    # Generated deepcopy files
    - path: zz_generated
      linters:
        - all
