site_name: kagents
site_description: Run Claude Code Agent Teams as a Kubernetes operator
site_url: https://kagents.dev
site_author: CAM Labs LLC

repo_name: amcheste/claude-teams-operator
repo_url: https://github.com/amcheste/claude-teams-operator
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 CAM Labs LLC

# Files inside docs/ that aren't part of the public site.
# `helm-values.md` and `cfp/` predate the docs site and link to repo
# files outside docs/; they'll be migrated into the site (helm-values
# under /reference/, cfp/ stays internal) in follow-up v0.7.0 issues.
# `README.md` collides with index.md on the auto-generated index — kept
# in-repo as the contributor-facing dev-loop guide.
exclude_docs: |
  README.md
  helm-values.md
  cfp/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        # Mermaid diagrams. Material has built-in renderer support; this
        # routes ```mermaid fences through it.
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amcheste/claude-teams-operator

# Diátaxis nav: Tutorials (learn) / How-to (solve) / Reference (look up) /
# Explanation (understand). Section index pages exist as placeholders so
# the structure is in place even before all content lands.
nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Getting started: tutorials/getting-started.md
  - How-to guides:
      - how-to/index.md
  - Reference:
      - reference/index.md
  - Explanation:
      - explanation/index.md
      - Resource model: explanation/resources.md
      - Coordination protocol: explanation/coordination.md
      - Operations: explanation/operations.md
