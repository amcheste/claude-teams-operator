{{define "content"}}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-semibold">Agent Teams</h1>
  <span class="text-xs text-slate-500" id="last-refresh">live · refreshes every 5s</span>
</div>

<div class="bg-white rounded-lg shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-slate-100 text-left text-xs uppercase text-slate-600">
      <tr>
        <th class="px-4 py-2">Namespace</th>
        <th class="px-4 py-2">Name</th>
        <th class="px-4 py-2">Phase</th>
        <th class="px-4 py-2">Ready</th>
        <th class="px-4 py-2">Tasks</th>
        <th class="px-4 py-2">Cost</th>
        <th class="px-4 py-2">Age</th>
      </tr>
    </thead>
    <tbody hx-get="/api/htmx/teams"
           hx-trigger="every 5s"
           hx-swap="innerHTML">
      {{template "list_rows" .Data}}
    </tbody>
  </table>
</div>

{{if not .Data}}
<div class="bg-white rounded-lg shadow-sm mt-4 p-6 text-center text-slate-500">
  No AgentTeams in scope. Apply one with <code class="text-xs bg-slate-100 px-1 py-0.5 rounded">kubectl apply</code> and it'll show up here.
</div>
{{end}}
{{end}}
